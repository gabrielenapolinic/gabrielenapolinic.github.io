# ============================================================
# PORTFOLIO CONFIGURATION
# ============================================================

site_name: Gabriele Nicola Napoli
site_description: Portfolio of a PhD researcher focusing on geological multi-risk and geospatial data analysis
site_author: Gabriele Nicola Napoli
site_url: https://gabrielenapolinic.github.io/
copyright: Copyright &copy; 2026 Gabriele Nicola Napoli

theme:
  name: material
  icon:
    logo: material/earth
  palette:
    - scheme: default            # Light mode
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate              # Dark mode
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs            # Top-level nav items shown as horizontal tabs
    - navigation.top             # Back-to-top button when scrolling up
    - content.code.copy          # Copy button on all code blocks
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html        
  - attr_list         
  - admonition        
  - pymdownx.details  
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:   
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gabrielenapolinic
    # - icon: fontawesome/brands/linkedin
    #   link: https://linkedin.com/in/[INSERISCI-IL-TUO-LINKEDIN]
    # - icon: material/email
    #   link: mailto:[LA-TUA-EMAIL]

plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "Virtual Test-Bed": projects/virtual-test-bed.md
    - "GEE Susceptibility Modeling": projects/gully-erosion-model.ipynb
  - Publications: publications.md
  - Experience: experience.md
  - Volunteering: volunteering.md
  - Contact: contact.md